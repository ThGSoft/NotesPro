{% extends 'dashboard/base.html' %}
{% block title %}Users{% endblock %}
{% block heading %}User Management{% endblock %}
{% block content %}
  <div class="card">
    <table>
      <thead>
        <tr><th>Username</th><th>Email</th><th>Active</th><th>Staff</th></tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.is_active }}</td>
            <td>{{ user.is_staff }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
