<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #f5f7fb; }
    .card { width: min(420px, 92vw); background: white; border-radius: 18px; padding: 28px; box-shadow: 0 8px 30px rgba(0,0,0,.06); }
    input { width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 10px; }
    button { width: 100%; border: 0; background: #2563eb; color: white; padding: 12px; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
