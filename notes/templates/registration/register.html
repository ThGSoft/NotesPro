<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <title>Register</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>
  <style>
    body { background:#0f172a; color:#e5e7eb; }
    .auth-box { max-width:520px; margin:60px auto; background:#111827; padding:24px; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    a { color:#93c5fd; }
  </style>
</head>
<body>
  <div class='auth-box'>
    <h2 class='mb-4'>Register</h2>
    <form method='post'>
      {% csrf_token %}
      {{ form.as_p }}
      <button class='btn btn-primary w-100'>Create account</button>
    </form>
    <p class='mt-3 mb-0'><a href=appBase + '/login/'>Back to login</a></p>
  </div>
</body>
</html>
