<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Two-factor authentication</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background:#0f172a; color:#e5e7eb; }
    .auth-box { max-width:420px; margin:80px auto; background:#111827; padding:24px; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    a { color:#93c5fd; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2 class="mb-3">Two-factor authentication</h2>
    <p class="text-secondary mb-4">Enter the 6-digit code from your authenticator app for <strong>{{ user.username }}</strong>.</p>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="token" class="form-label">Verification code</label>
        <input type="text" class="form-control" id="token" name="token" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="8" required autofocus>
      </div>
      <button class="btn btn-primary w-100" type="submit">Verify</button>
    </form>
    <p class="mt-3 mb-0"><a href="{% url 'login' %}">Back to login</a></p>
  </div>
</body>
</html>
